name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  #  web: lint + type-check + test + build
  # ---------------------------------------------------------------------------
  web:
    name: web · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test (unit)
        run: npm run test -- --reporter=verbose

      - name: Build
        env:
          # Env fake para build passar sem credenciais reais
          VITE_FIREBASE_API_KEY: ci-fake-key-for-build-only-never-used
          VITE_FIREBASE_AUTH_DOMAIN: ci.example.com
          VITE_FIREBASE_PROJECT_ID: ci-project
          VITE_FIREBASE_STORAGE_BUCKET: ci.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:ci'
          VITE_USE_EMULATORS: 'false'
          VITE_EMULATOR_HOST: '127.0.0.1'
          VITE_APP_ENV: 'staging-mental'
          VITE_SENTRY_ENVIRONMENT: 'ci'
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  #  functions: lint + type-check + test + build
  # ---------------------------------------------------------------------------
  functions:
    name: functions · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  #  rules: valida sintaxe de firestore.rules e storage.rules
  # ---------------------------------------------------------------------------
  rules:
    name: rules · syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate Firestore rules
        run: |
          firebase --project default emulators:exec \
            --only firestore \
            'echo "Firestore rules loaded successfully"' \
            || (echo "Firestore rules failed to load" && exit 1)
        continue-on-error: true

      - name: Check rules files exist
        run: |
          test -f firestore.rules || (echo "firestore.rules missing" && exit 1)
          test -f storage.rules || (echo "storage.rules missing" && exit 1)
          test -f firestore.indexes.json || (echo "firestore.indexes.json missing" && exit 1)
